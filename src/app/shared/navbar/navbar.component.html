<header class="navbar" [ngClass]="{'scrolled': isScrolled}">
  <div class="container navbar-inner">
    <div class="logo">
      <a routerLink="/" (click)="closeMenu()">
        <!-- Placeholder for logo. Following reference design, circle with text -->
        <div class="logo-circle">SM</div>
        <span class="logo-text">Srushti Modi</span>
      </a>
    </div>

    <!-- Desktop Navigation -->
    <nav class="nav-links desktop-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ 'NAV.HOME' | translate
        }}</a>
      <a routerLink="/projects" routerLinkActive="active">{{ 'NAV.PORTFOLIO' | translate }}</a>
      <a href="#about" (click)="closeMenu()">{{ 'NAV.ABOUT' | translate }}</a>
    </nav>

    <div class="nav-right">
      <div class="nav-actions">
        <button class="lang-toggle nav-lang-btn" (click)="toggleLanguage()">{{ currentLang === 'en' ? 'FR' : 'EN' }}</button>
        <a href="#contact" class="btn btn-primary btn-cta desktop-menu">{{ 'NAV.CONTACT' | translate }}</a>
      </div>

      <!-- Mobile Menu Toggle -->
      <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen">
        <span class="hamburger" [ngClass]="{'open': isMenuOpen}"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Navigation Panel -->
  <div class="mobile-menu-overlay" [ngClass]="{'open': isMenuOpen}">
    <nav class="mobile-nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">{{
        'NAV.HOME' | translate }}</a>
      <a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">{{ 'NAV.PORTFOLIO' | translate }}</a>
      <a href="#about" (click)="closeMenu()">{{ 'NAV.ABOUT' | translate }}</a>
      <a href="#contact" class="btn btn-primary mt-4" (click)="closeMenu()">{{ 'NAV.CONTACT' | translate }}</a>
    </nav>
  </div>
</header>
