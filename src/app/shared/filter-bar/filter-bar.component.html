<div class="filter-wrapper">
  <div class="filter-scroll">
    <ng-container *ngFor="let filter of filters">
      <button 
        class="filter-btn" 
        [class.active]="activeFilter === filter.id"
        (click)="setFilter(filter.id)">
        {{ filter.label | translate }}
      </button>
    </ng-container>
  </div>
</div>
